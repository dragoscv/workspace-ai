name: Workspace AI Quality Assurance

on:
  push:
    branches: [ main, develop ]
    paths:
      - '.github/instructions/**'
      - 'src/**'
  pull_request:
    branches: [ main ]
    paths:
      - '.github/instructions/**'
      - 'src/**'
  schedule:
    # Run weekly quality checks
    - cron: '0 6 * * 1'

jobs:
  validate-instructions:
    name: Validate Instruction Files
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Validate instruction syntax and structure
      run: npm run validate
      
    - name: Check instruction completeness
      run: npm run validate -- --rules all
      
    - name: Auto-fix minor issues
      run: npm run validate -- --fix
      
    - name: Commit auto-fixes
      if: github.event_name == 'push'
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-fix instruction validation issues"
        git push

  generate-reports:
    name: Generate Quality Reports
    runs-on: ubuntu-latest
    needs: validate-instructions
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Generate coverage report
      run: npm run generate -- --type coverage --output ./reports
      
    - name: Generate quality report
      run: npm run generate -- --type quality --output ./reports
      
    - name: Generate metrics report
      run: npm run metrics -- --period week --export html
      
    - name: Upload reports
      uses: actions/upload-artifact@v4
      with:
        name: quality-reports
        path: reports/
        retention-days: 30
        
    - name: Comment PR with quality summary
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          try {
            const coverage = JSON.parse(fs.readFileSync('./reports/coverage-report.json', 'utf8'));
            const comment = `## 📊 Instruction Quality Report
            
            **Coverage:** ${coverage.completionPercentage}%
            **Total Files:** ${coverage.totalFiles}
            
            ${coverage.missingRoles.length > 0 ? `**Missing Roles:** ${coverage.missingRoles.join(', ')}` : '✅ All roles covered'}
            
            **Recommendations:**
            ${coverage.recommendations.map(r => `- ${r}`).join('\n')}
            
            [View detailed reports](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          } catch (error) {
            console.log('Could not generate quality comment:', error);
          }

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'

  performance-test:
    name: Performance Testing
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run performance tests
      run: npm test -- --reporter=json > test-results.json
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test-results.json

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: [validate-instructions, generate-reports]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Generate documentation
      run: |
        npm run generate -- --type coverage --output ./docs/reports
        npm run generate -- --type quality --output ./docs/reports
        
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
        
  notify-team:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [validate-instructions, generate-reports]
    if: failure()
    
    steps:
    - name: Send Slack notification
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#workspace-ai'
        text: |
          🚨 Workspace AI quality check failed!
          
          Repository: ${{ github.repository }}
          Branch: ${{ github.ref }}
          Commit: ${{ github.sha }}
          
          Please check the failed workflow and fix any issues.
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
